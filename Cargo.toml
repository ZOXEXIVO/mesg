[package]
name = "mesg"
version = "0.3.0"
authors = ["ZOXEXIVO <zoxexivo@gmail.com>"]
edition = "2021"

[dependencies]
tokio = { version = "1.34.0", features = ["full"] }
hyper = { version = "1.0.1", features = ["full"] }
toml = "0.8.8"
lz4 = "1.24.0"
serde = "1.0.193"
tonic = "0.10.2"
prost = "0.12.3"
timer = "0.2.0"
chrono = "0.4.31"
log = { version = "0.4.20", features = ["release_max_level_info"] }
env_logger = "0.10.1"
bytes = "1.5.0"
oneshot = "0.1.6"
chashmap = "2.2.2"
futures = "0.3.29"
async-trait = "0.1.74"
color-eyre = "0.6.2"
anyhow = "1.0.75"
structopt = "0.3.26"
lazy_static = "1.4.0"
thread-id = "4.2.1"
rand = "0.8.5"
dashmap = "5.5.3"
log4rs = "1.2.0"
uuid = { version = "1.6.1", features = ["v4"] } 
redb = "1.4.0"
#console-subscriber = "0.1.8"

[build-dependencies]
tonic-build = "0.10.2"
prost-build = "0.12.3"
