[package]
name = "mesg"
version = "0.3.0"
authors = ["ZOXEXIVO <zoxexivo@gmail.com>"]
edition = "2021"

[dependencies]
tokio = { version = "1.39.2", features = ["full"] }
hyper = { version = "1.4.1", features = ["full"] }
toml = "0.8.19"
lz4 = "1.26.0"
serde = "1.0.206"
tonic = "0.12.1"
prost = "0.13.1"
timer = "0.2.0"
chrono = "0.4.38"
log = { version = "0.4.22", features = ["release_max_level_info"] }
env_logger = "0.11.5"
bytes = "1.7.1"
oneshot = "0.1.8"
chashmap = "2.2.2"
futures = "0.3.30"
async-trait = "0.1.81"
color-eyre = "0.6.3"
anyhow = "1.0.86"
structopt = "0.3.26"
lazy_static = "1.5.0"
sled = "0.34.7"
thread-id = "4.2.2"
rand = "0.8.5"
dashmap = "6.0.1"
log4rs = "1.3.0"
http-body-util = "0.1.2"
hyper-util = "0.1.7"
tower = "0.4.13"

[build-dependencies]
tonic-build = "0.12.1"
prost-build = "0.13.1"
